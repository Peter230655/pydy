name: tests

on:
  push:
    branches: master
  pull_request:
    branches: master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build:
    name: Build and run tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    defaults:
      run:
        shell: bash -l {0}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: test-environment
          auto-update-conda: true
          channels: conda-forge
          conda-remove-defaults: "true"
          miniforge-version: latest
          python-version: ${{ matrix.python-version }}
      - name: Install basic dependencies
        run: |
          conda install -q -y coverage cython matplotlib packaging pip pytest pytest-cov numpy pythreejs setuptools symjit sympy scipy
      - name: Install window dependencies
        if: ${{ matrix.os=='windows-latest' }}
        run: |
          conda install -q -y pywin32
      - name: Test with pytest
        run: pytest --cov .
      - name: Test installation of PyDy
        run: python -m pip install --no-deps --no-build-isolation .
